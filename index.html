<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุขสันต์วันเกิดคุณแม่</title>
    <!-- โหลดฟอนต์สวยๆ จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Charm:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="card">
        <div class="heart-icon">❤️</div>
        <h1>สุขสันต์วันเกิดคุณแม่</h1>
        <p>ขอให้คุณแม่มีความสุขมากๆ สุขภาพร่างกายแข็งแรง<br>ยิ้มเยอะๆ ในทุกๆ วันนะครับ<br>รักแม่ที่สุดเลย!</p>
        
        <button class="btn" onclick="revealMessage()">คลิกเพื่อดูคำอวยพรพิเศษ ✨</button>
        
        <div id="message" class="secret-message">
            ขอบคุณที่คอยดูแลและซัพพอร์ตกันมาตลอดนะครับ 💖
        </div>

        <!-- ดอกไม้ตกแบบสุ่ม -->
        <div class="flowers-container"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
